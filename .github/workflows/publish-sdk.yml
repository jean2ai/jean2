name: Publish SDK to NPM

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  id-token: write
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: publish-sdk
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/sdk/v')
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          registry-url: https://registry.npmjs.org

      - name: Resolve and validate version
        id: version
        run: |
          PKG_VERSION=$(node -p "require('./packages/sdk/package.json').version")
          echo "version=$PKG_VERSION" >> $GITHUB_OUTPUT
          echo "SDK version from package.json: $PKG_VERSION"

          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/sdk/v}"
            echo "Release tag version: $TAG_VERSION"
            if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
              echo "::error::Release tag version ($TAG_VERSION) does not match packages/sdk/package.json version ($PKG_VERSION)"
              exit 1
            fi
          fi

      - name: Install dependencies
        run: bun install

      - name: Sync version.ts from package.json
        run: |
          cd packages/sdk
          V="${{ steps.version.outputs.version }}"
          node -e "require('fs').writeFileSync('src/version.ts', \"export const version: string = '$V';\n\")"

      - name: Build SDK
        run: |
          cd packages/sdk
          bun run build

      - name: Prepare package.json for npm
        run: |
          cd packages/sdk
          VERSION="${{ steps.version.outputs.version }}"
          node -e "const p=require('./package.npm.json');p.version='$VERSION';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"

      - name: Check if version already exists on npm
        id: check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if npm view "@jean2/sdk@$VERSION" version >/dev/null 2>&1; then
            echo "Version $VERSION already exists on npm, skipping publish"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        id: publish
        if: steps.check.outputs.skip != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/sdk
          VERSION="${{ steps.version.outputs.version }}"
          echo "Publishing version $VERSION"
          npm publish --provenance --access public

  announce:
    needs: publish
    runs-on: ubuntu-latest
    if: always() && needs.publish.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Update VERSION file
        env:
          V: ${{ needs.publish.outputs.version }}
        run: |
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          git checkout -B "$DEFAULT_BRANCH" "origin/$DEFAULT_BRANCH"

          CURRENT=$(cat packages/sdk/VERSION | tr -d '[:space:]')
          if [ "$CURRENT" = "$V" ]; then
            echo "VERSION already at $V, nothing to do"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$V" > packages/sdk/VERSION
          git add packages/sdk/VERSION
          git commit -m "chore(sdk): announce $V"
          git push origin "$DEFAULT_BRANCH"
          echo "Announced SDK $V"
