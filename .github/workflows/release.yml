name: Release

on:
  workflow_dispatch:
    inputs:
      release_server:
        description: 'Release server'
        required: false
        default: false
        type: boolean
      release_all_tools:
        description: 'Release all tools (bun + node)'
        required: false
        default: false
        type: boolean
      release_bun_tools:
        description: 'Release all bun tools only'
        required: false
        default: false
        type: boolean
      release_node_tools:
        description: 'Release all node tools only'
        required: false
        default: false
        type: boolean
      force:
        description: 'Force release (recreate existing)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-releases:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.items }}
    steps:
      - id: matrix
        run: |
          ITEMS='[]'
          
          # Server
          if [ "${{ inputs.release_server }}" = "true" ]; then
            ITEMS=$(echo "$ITEMS" | jq -c '. += [{"type": "server"}]')
          fi
          
          # Tools - bun
          BUN_TOOLS=(apply-patch-bun edit-bun glob-bun grep-bun ls-bun multiedit-bun read-file-bun shell-bun todoread-bun todowrite-bun webfetch-bun write-file-bun)
          if [ "${{ inputs.release_all_tools }}" = "true" ] || [ "${{ inputs.release_bun_tools }}" = "true" ]; then
            for TOOL in "${BUN_TOOLS[@]}"; do
              ITEMS=$(echo "$ITEMS" | jq -c --arg t "$TOOL" '. += [{"type": "tool", "packageName": $t}]')
            done
          fi
          
          # Tools - node
          NODE_TOOLS=(apply-patch-node edit-node glob-node grep-node ls-node multiedit-node read-file-node shell-node todoread-node todowrite-node webfetch-node write-file-node)
          if [ "${{ inputs.release_all_tools }}" = "true" ] || [ "${{ inputs.release_node_tools }}" = "true" ]; then
            for TOOL in "${NODE_TOOLS[@]}"; do
              ITEMS=$(echo "$ITEMS" | jq -c --arg t "$TOOL" '. += [{"type": "tool", "packageName": $t}]')
            done
          fi
          
          echo "items=$ITEMS" >> $GITHUB_OUTPUT

  release:
    needs: prepare-releases
    if: needs.prepare-releases.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        item: ${{ fromJson(needs.prepare-releases.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Release
        env:
          RELEASE_TYPE: ${{ matrix.item.type }}
          PACKAGE_NAME: ${{ matrix.item.packageName }}
          FORCE: ${{ inputs.force }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "$RELEASE_TYPE" = "server" ]; then
            V=$(cat packages/server/VERSION) && TAG="server/v${V}"
            if gh release view "$TAG" 2>/dev/null; then
              if [ "$FORCE" != "true" ]; then
                echo "Skipping $TAG - release already exists"
                continue
              fi
              echo "Deleting existing release $TAG for force recreation..."
              gh release delete "$TAG" --yes || true
            fi
            git tag -f "$TAG"
            git push origin "$TAG" --force
            mkdir -p packages/server/dist
            bun build --compile --target=bun-darwin-arm64 --define=JEAN2_VERSION="'${V}'" --outfile=packages/server/dist/jean2-darwin packages/server/src/cli.ts
            bun build --compile --target=bun-linux-x64 --define=JEAN2_VERSION="'${V}'" --outfile=packages/server/dist/jean2-linux packages/server/src/cli.ts
            bun build --compile --target=bun-windows-x64 --define=JEAN2_VERSION="'${V}'" --outfile=packages/server/dist/jean2-windows.exe packages/server/src/cli.ts
            [[ "$V" == *"- "* ]] && PRE="--prerelease" || PRE=""
            NOTES_FLAG=""
            if [ -s "changelogs/server/v${V}.md" ]; then
              NOTES_FLAG="--notes-file changelogs/server/v${V}.md"
            fi
            gh release create "$TAG" --title "Server $V" $PRE $NOTES_FLAG \
              packages/server/dist/jean2-darwin packages/server/dist/jean2-linux packages/server/dist/jean2-windows.exe

          elif [ "$RELEASE_TYPE" = "tool" ]; then
            P="tools/$PACKAGE_NAME"
            V=$(cat "$P/VERSION") && TAG="tool-$PACKAGE_NAME/v${V}"
            if gh release view "$TAG" 2>/dev/null; then
              echo "Skipping $TAG - release already exists"
              exit 0
            fi
            git tag -f "$TAG"
            git push origin "$TAG" --force
            tar -czf "$PACKAGE_NAME.tar.gz" -C "$P" .
            [[ "$V" == *"- "* ]] && PRE="--prerelease" || PRE=""
            NOTES_FLAG=""
            if [ -s "changelogs/tools/$PACKAGE_NAME/v${V}.md" ]; then
              NOTES_FLAG="--notes-file changelogs/tools/$PACKAGE_NAME/v${V}.md"
            fi
            gh release create "$TAG" --title "Tool $PACKAGE_NAME $V" $PRE $NOTES_FLAG "$PACKAGE_NAME.tar.gz"
          fi