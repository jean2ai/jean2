name: Release

on:
  workflow_dispatch:
    inputs:
      release_server:
        description: 'Release server'
        required: false
        default: false
        type: boolean
      release_client:
        description: 'Release client'
        required: false
        default: false
        type: boolean
      tool_apply_patch:
        description: 'Release apply-patch tool'
        required: false
        default: false
        type: boolean
      tool_edit:
        description: 'Release edit tool'
        required: false
        default: false
        type: boolean
      tool_glob:
        description: 'Release glob tool'
        required: false
        default: false
        type: boolean
      tool_grep:
        description: 'Release grep tool'
        required: false
        default: false
        type: boolean
      tool_ls:
        description: 'Release ls tool'
        required: false
        default: false
        type: boolean
      tool_multiedit:
        description: 'Release multiedit tool'
        required: false
        default: false
        type: boolean
      tool_read_file:
        description: 'Release read-file tool'
        required: false
        default: false
        type: boolean
      tool_shell:
        description: 'Release shell tool'
        required: false
        default: false
        type: boolean
      tool_todoread:
        description: 'Release todoread tool'
        required: false
        default: false
        type: boolean
      tool_todowrite:
        description: 'Release todowrite tool'
        required: false
        default: false
        type: boolean
      tool_webfetch:
        description: 'Release webfetch tool'
        required: false
        default: false
        type: boolean
      tool_write_file:
        description: 'Release write-file tool'
        required: false
        default: false
        type: boolean
      force:
        description: 'Force release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-releases:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.items }}
    steps:
      - id: matrix
        run: |
          ITEMS='[]'
          
          # Server
          if [ "${{ inputs.release_server }}" = "true" ]; then
            ITEMS=$(echo "$ITEMS" | jq -c '. += [{"type": "server"}]')
          fi
          
          # Tools - explicit checks for each
          if [ "${{ inputs.tool_apply_patch }}" = "true" ]; then
            ITEMS=$(echo "$ITEMS" | jq -c '. += [{"type": "tool", "name": "apply-patch"}]')
          fi
          if [ "${{ inputs.tool_edit }}" = "true" ]; then
            ITEMS=$(echo "$ITEMS" | jq -c '. += [{"type": "tool", "name": "edit"}]')
          fi
          if [ "${{ inputs.tool_glob }}" = "true" ]; then
            ITEMS=$(echo "$ITEMS" | jq -c '. += [{"type": "tool", "name": "glob"}]')
          fi
          if [ "${{ inputs.tool_grep }}" = "true" ]; then
            ITEMS=$(echo "$ITEMS" | jq -c '. += [{"type": "tool", "name": "grep"}]')
          fi
          if [ "${{ inputs.tool_ls }}" = "true" ]; then
            ITEMS=$(echo "$ITEMS" | jq -c '. += [{"type": "tool", "name": "ls"}]')
          fi
          if [ "${{ inputs.tool_multiedit }}" = "true" ]; then
            ITEMS=$(echo "$ITEMS" | jq -c '. += [{"type": "tool", "name": "multiedit"}]')
          fi
          if [ "${{ inputs.tool_read_file }}" = "true" ]; then
            ITEMS=$(echo "$ITEMS" | jq -c '. += [{"type": "tool", "name": "read-file"}]')
          fi
          if [ "${{ inputs.tool_shell }}" = "true" ]; then
            ITEMS=$(echo "$ITEMS" | jq -c '. += [{"type": "tool", "name": "shell"}]')
          fi
          if [ "${{ inputs.tool_todoread }}" = "true" ]; then
            ITEMS=$(echo "$ITEMS" | jq -c '. += [{"type": "tool", "name": "todoread"}]')
          fi
          if [ "${{ inputs.tool_todowrite }}" = "true" ]; then
            ITEMS=$(echo "$ITEMS" | jq -c '. += [{"type": "tool", "name": "todowrite"}]')
          fi
          if [ "${{ inputs.tool_webfetch }}" = "true" ]; then
            ITEMS=$(echo "$ITEMS" | jq -c '. += [{"type": "tool", "name": "webfetch"}]')
          fi
          if [ "${{ inputs.tool_write_file }}" = "true" ]; then
            ITEMS=$(echo "$ITEMS" | jq -c '. += [{"type": "tool", "name": "write-file"}]')
          fi
          
          echo "items=$ITEMS" >> $GITHUB_OUTPUT

  release:
    needs: prepare-releases
    if: needs.prepare-releases.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        item: ${{ fromJson(needs.prepare-releases.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Release
        env:
          RELEASE_TYPE: ${{ matrix.item.type }}
          TOOL_NAME: ${{ matrix.item.name }}
          FORCE: ${{ inputs.force }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "$RELEASE_TYPE" = "server" ]; then
            V=$(cat packages/server/VERSION) && TAG="server/v${V}"
            if gh release view "$TAG" 2>/dev/null; then
              if [ "$FORCE" != "true" ]; then
                echo "Skipping $TAG - release already exists"
                continue
              fi
              echo "Deleting existing release $TAG for force recreation..."
              gh release delete "$TAG" --yes || true
            fi
            git tag -f "$TAG"
            git push origin "$TAG" --force
            mkdir -p packages/server/dist
            bun build --compile --target=bun-darwin-arm64 --define=JEAN2_VERSION="'${V}'" --outfile=packages/server/dist/jean2-darwin packages/server/src/cli.ts
            bun build --compile --target=bun-linux-x64 --define=JEAN2_VERSION="'${V}'" --outfile=packages/server/dist/jean2-linux packages/server/src/cli.ts
            bun build --compile --target=bun-windows-x64 --define=JEAN2_VERSION="'${V}'" --outfile=packages/server/dist/jean2-windows.exe packages/server/src/cli.ts
            [[ "$V" == *"- "* ]] && PRE="--prerelease" || PRE=""
            gh release create "$TAG" --title "Server $V" $PRE \
              packages/server/dist/jean2-darwin packages/server/dist/jean2-linux packages/server/dist/jean2-windows.exe

          elif [ "$RELEASE_TYPE" = "tool" ]; then
            P="tools/$TOOL_NAME"
            V=$(cat "$P/VERSION") && TAG="tool-$TOOL_NAME/v${V}"
            if gh release view "$TAG" 2>/dev/null; then
              if [ "$FORCE" != "true" ]; then
                echo "Skipping $TAG - release already exists"
                continue
              fi
              echo "Deleting existing release $TAG for force recreation..."
              gh release delete "$TAG" --yes || true
            fi
            git tag -f "$TAG"
            git push origin "$TAG" --force
            tar -czf "$TOOL_NAME.tar.gz" -C "$P" .
            [[ "$V" == *"- "* ]] && PRE="--prerelease" || PRE=""
            gh release create "$TAG" --title "Tool $TOOL_NAME $V" $PRE "$TOOL_NAME.tar.gz"
          fi

  prepare-client-release:
    needs: prepare-releases
    runs-on: ubuntu-latest
    if: inputs.release_client
    outputs:
      tag: ${{ steps.info.outputs.tag }}
      version: ${{ steps.info.outputs.version }}
      prerelease: ${{ steps.info.outputs.prerelease }}
      release_exists: ${{ steps.info.outputs.release_exists }}
      should_skip: ${{ steps.info.outputs.should_skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: info
        run: |
          V=$(cat packages/client/VERSION)
          TAG="client/v${V}"
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          
          # Check if release exists
          if gh release view "$TAG" 2>/dev/null; then
            if [ "${{ inputs.force }}" != "true" ]; then
              echo "release_exists=true" >> $GITHUB_OUTPUT
              echo "should_skip=true" >> $GITHUB_OUTPUT
              echo "prerelease=false" >> $GITHUB_OUTPUT
              echo "Release $TAG already exists, skipping..."
              exit 0
            else
              echo "release_exists=true" >> $GITHUB_OUTPUT
              echo "Deleting existing release $TAG for force recreation..."
              gh release delete "$TAG" --yes || true
            fi
          else
            echo "release_exists=false" >> $GITHUB_OUTPUT
          fi
          
          echo "should_skip=false" >> $GITHUB_OUTPUT
          
          # Configure git and push tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG"
          git push origin "$TAG" --force
          
          # Determine prerelease flag based on version containing hyphen
          if [[ "$V" == *"-"* ]]; then
            PRE="true"
          else
            PRE="false"
          fi
          echo "prerelease=$PRE" >> $GITHUB_OUTPUT
          
          # Create the GitHub release exactly once (without artifacts)
          if [ "$PRE" == "true" ]; then
            gh release create "$TAG" --title "Client $V" --prerelease
          else
            gh release create "$TAG" --title "Client $V"
          fi
          echo "Release $TAG created successfully"

  release-client-macos:
    needs: [prepare-releases, prepare-client-release]
    runs-on: macos-latest
    if: inputs.release_client && needs.prepare-client-release.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install
        run: bun install

      - name: Sync version from VERSION file
        run: |
          V=$(cat packages/client/VERSION)
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('packages/client/src-tauri/tauri.conf.json', 'utf8'));
            conf.version = '$V';
            fs.writeFileSync('packages/client/src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "
          echo "Set tauri.conf.json version to $V"

      - name: Build client (macOS)
        id: build
        run: |
          cd packages/client && bun run tauri build --target aarch64-apple-darwin
          DMG=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          if [ -z "$DMG" ]; then
            echo "ERROR: No DMG artifact found"
            exit 1
          fi
          # Convert to absolute path from repo root
          ABS_DMG="$(pwd)/$DMG"
          echo "artifact=$ABS_DMG" >> $GITHUB_OUTPUT

      - name: Upload macOS artifact
        env:
          TAG: ${{ needs.prepare-client-release.outputs.tag }}
        run: |
          DMG_PATH="${{ steps.build.outputs.artifact }}"
          BASENAME=$(basename "$DMG_PATH")
          # Copy to versionless name: Jean2-macos-aarch64.dmg
          cp "$DMG_PATH" "Jean2-macos-aarch64.dmg"
          gh release upload "$TAG" "Jean2-macos-aarch64.dmg" --clobber

  release-client-windows:
    needs: [prepare-releases, prepare-client-release]
    runs-on: windows-latest
    if: inputs.release_client && needs.prepare-client-release.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install
        run: bun install

      - name: Sync version from VERSION file
        shell: bash
        run: |
          V=$(cat packages/client/VERSION)
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('packages/client/src-tauri/tauri.conf.json', 'utf8'));
            conf.version = '$V';
            fs.writeFileSync('packages/client/src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "
          echo "Set tauri.conf.json version to $V"

      - name: Build client (Windows)
        shell: bash
        run: |
          cd packages/client
          bun run tauri build --target x86_64-pc-windows-msvc

      - name: Discover and upload Windows artifacts
        shell: bash
        env:
          TAG: ${{ needs.prepare-client-release.outputs.tag }}
        id: upload
        run: |
          BUNDLE_DIR="packages/client/src-tauri/target/x86_64-pc-windows-msvc/release/bundle"
          FOUND=0
          
          # Upload MSI installers if found
          if [ -d "$BUNDLE_DIR/msi" ]; then
            MSI_FILES=$(find "$BUNDLE_DIR/msi" -name "*.msi" 2>/dev/null)
            if [ -n "$MSI_FILES" ]; then
              for msi in $MSI_FILES; do
                echo "Uploading MSI: $msi"
                # Copy to versionless name: Jean2-windows-x64.msi
                cp "$msi" "Jean2-windows-x64.msi"
                gh release upload "$TAG" "Jean2-windows-x64.msi" --clobber
                FOUND=1
              done
            fi
          fi
          
          # Upload NSIS installers (.exe) if found
          if [ -d "$BUNDLE_DIR/nsis" ]; then
            EXE_FILES=$(find "$BUNDLE_DIR/nsis" -name "*.exe" 2>/dev/null)
            if [ -n "$EXE_FILES" ]; then
              for exe in $EXE_FILES; do
                echo "Uploading EXE: $exe"
                # Copy to versionless name: Jean2-windows-x64.exe
                cp "$exe" "Jean2-windows-x64.exe"
                gh release upload "$TAG" "Jean2-windows-x64.exe" --clobber
                FOUND=1
              done
            fi
          fi
          
          if [ "$FOUND" -eq 0 ]; then
            echo "ERROR: No Windows installer artifacts (.msi or .exe) found in $BUNDLE_DIR"
            exit 1
          fi
          
          echo "Successfully uploaded Windows artifacts"
