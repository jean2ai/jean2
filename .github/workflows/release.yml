name: Release

on:
  workflow_dispatch:
    inputs:
      release_server:
        description: 'Release server'
        required: false
        default: false
        type: boolean
      release_all_tools:
        description: 'Release all tools'
        required: false
        default: false
        type: boolean
      force:
        description: 'Force release (recreate existing)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-releases:
    runs-on: ubuntu-latest
    outputs:
      tools: ${{ steps.matrix.outputs.tools }}
      has_server: ${{ steps.matrix.outputs.has_server }}
      has_tools: ${{ steps.matrix.outputs.has_tools }}
    steps:
      - uses: actions/checkout@v4

      - id: matrix
        run: |
          TOOLS='[]'
          HAS_SERVER="false"
          HAS_TOOLS="false"

          # Server
          if [ "${{ inputs.release_server }}" = "true" ]; then
            HAS_SERVER="true"
          fi

          # Tools
          if [ "${{ inputs.release_all_tools }}" = "true" ]; then
            HAS_TOOLS="true"
            while IFS= read -r TOOL; do
              V=$(jq -r .version "tools/$TOOL/package.json")
              TOOLS=$(echo "$TOOLS" | jq -c --arg name "$TOOL" --arg version "$V" '. += [{"packageName": $name, "version": $version}]')
            done < <(jq -r '.tools[]' tools/manifest.json)
          fi

          echo "tools=$TOOLS" >> $GITHUB_OUTPUT
          echo "has_server=$HAS_SERVER" >> $GITHUB_OUTPUT
          echo "has_tools=$HAS_TOOLS" >> $GITHUB_OUTPUT

  prepare-server-release:
    needs: prepare-releases
    if: needs.prepare-releases.outputs.has_server == 'true'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release
        id: release
        env:
          FORCE: ${{ inputs.force }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Version source is package.json; VERSION only records the announced version
          V=$(jq -r .version packages/server/package.json) && TAG="server/v${V}"
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          if gh release view "$TAG" 2>/dev/null; then
            if [ "$FORCE" != "true" ]; then
              echo "Skipping $TAG - release already exists"
              exit 0
            fi
            echo "Deleting existing release $TAG for force recreation..."
            gh release delete "$TAG" --yes || true
          fi
          git tag -f "$TAG"
          git push origin "$TAG" --force

          [[ "$V" == *"-"* ]] && PRE="--prerelease" || PRE=""
          NOTES_FLAG=""
          if [ -s "changelogs/server/v${V}.md" ]; then
            NOTES_FLAG="--notes-file changelogs/server/v${V}.md"
          fi
          gh release create "$TAG" --title "Server $V" $PRE $NOTES_FLAG

  release-server-macos:
    needs: prepare-server-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Build macOS binary
        env:
          V: ${{ needs.prepare-server-release.outputs.version }}
        run: |
          mkdir -p packages/server/dist
          bun build --compile --target=bun-darwin-arm64 --define=JEAN2_VERSION="'${V}'" --outfile=packages/server/dist/jean2-darwin packages/server/src/cli.ts

      - name: Import Apple Certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          echo "$CSC_LINK" | base64 --decode > "$CERT_PATH"
          security create-keychain -p actions "$KEYCHAIN_PATH"
          security list-keychains -s "$KEYCHAIN_PATH"
          security unlock-keychain -p actions "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CSC_KEY_PASSWORD" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -k actions "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"

      - name: Remove existing signature
        run: codesign --remove-signature packages/server/dist/jean2-darwin || true

      - name: Code Sign
        run: |
          IDENTITY=$(security find-identity -v -p codesigning $RUNNER_TEMP/signing.keychain-db | grep "Developer ID Application" | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Signing identity: $IDENTITY"
          codesign --force --options runtime \
            --entitlements packages/server/build/entitlements.mac.plist \
            --sign "$IDENTITY" \
            packages/server/dist/jean2-darwin

      - name: Verify Signature
        run: codesign --verify --deep --strict --verbose=2 packages/server/dist/jean2-darwin

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd packages/server/dist
          zip -y jean2-darwin.zip jean2-darwin
          xcrun notarytool submit jean2-darwin.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          rm jean2-darwin.zip

      - name: Staple Notarization Ticket
        run: xcrun stapler staple packages/server/dist/jean2-darwin || echo "Stapling skipped (expected for bare binaries)"

      - name: Upload macOS Binary
        env:
          TAG: ${{ needs.prepare-server-release.outputs.tag }}
        run: gh release upload "$TAG" packages/server/dist/jean2-darwin --clobber

      - name: Cleanup Keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/signing.keychain-db || true

  release-server-linux-windows:
    needs: prepare-server-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Build Linux and Windows binaries
        env:
          V: ${{ needs.prepare-server-release.outputs.version }}
        run: |
          mkdir -p packages/server/dist
          bun build --compile --target=bun-linux-x64 --define=JEAN2_VERSION="'${V}'" --outfile=packages/server/dist/jean2-linux packages/server/src/cli.ts
          bun build --compile --target=bun-windows-x64-baseline --define=JEAN2_VERSION="'${V}'" --outfile=packages/server/dist/jean2-windows.exe packages/server/src/cli.ts

      - name: Upload Linux and Windows binaries
        env:
          TAG: ${{ needs.prepare-server-release.outputs.tag }}
        run: gh release upload "$TAG" packages/server/dist/jean2-linux packages/server/dist/jean2-windows.exe --clobber

  announce-server:
    needs: [prepare-server-release, release-server-macos, release-server-linux-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Create server announcement pull request
        env:
          GH_TOKEN: ${{ github.token }}
          V: ${{ needs.prepare-server-release.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          BRANCH="release/announce-server-${V}"
          git checkout -B "$BRANCH" "origin/$DEFAULT_BRANCH"
          CURRENT=$(cat packages/server/VERSION 2>/dev/null | tr -d '[:space:]')
          if [ "$V" = "$CURRENT" ]; then
            echo "Server VERSION already at $V - nothing to announce"
            exit 0
          fi

          echo "$V" > packages/server/VERSION
          git add packages/server/VERSION
          git commit -m "release: announce server $V"
          git push --force origin "HEAD:$BRANCH"

          if gh pr list --head "$BRANCH" --base "$DEFAULT_BRANCH" --state open --json number --jq 'length' | grep -q '^0$'; then
            gh pr create \
              --base "$DEFAULT_BRANCH" \
              --head "$BRANCH" \
              --title "release: announce server $V" \
              --body "Announces server $V after all release artifacts were published successfully."
          else
            echo "Announcement pull request already exists for $BRANCH"
          fi

  release-tools:
    needs: prepare-releases
    if: needs.prepare-releases.outputs.has_tools == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        item: ${{ fromJson(needs.prepare-releases.outputs.tools) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Release tool
        env:
          PACKAGE_NAME: ${{ matrix.item.packageName }}
          V: ${{ matrix.item.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          P="tools/$PACKAGE_NAME"
          TAG="tool-$PACKAGE_NAME/v${V}"

          if gh release view "$TAG" 2>/dev/null; then
            echo "Skipping $TAG - release already exists"
            exit 0
          fi
          git tag -f "$TAG"
          git push origin "$TAG" --force

          # Stage source artifacts and generate VERSION from package.json version
          STAGING=$(mktemp -d)
          cp "$P/tool.ts" "$P/package.json" "$STAGING/"
          echo "$V" > "$STAGING/VERSION"

          tar -czf "$PACKAGE_NAME.tar.gz" -C "$STAGING" tool.ts package.json VERSION

          # Compute SHA-256 checksum
          SHA256=$(shasum -a 256 "$PACKAGE_NAME.tar.gz" | cut -d' ' -f1)
          echo "$SHA256" > "$PACKAGE_NAME.tar.gz.sha256"
          echo "SHA-256: $SHA256"

          [[ "$V" == *"-"* ]] && PRE="--prerelease" || PRE=""
          NOTES_FLAG=""
          if [ -s "changelogs/tools/$PACKAGE_NAME/v${V}.md" ]; then
            NOTES_FLAG="--notes-file changelogs/tools/$PACKAGE_NAME/v${V}.md"
          fi
          gh release create "$TAG" --title "Tool $PACKAGE_NAME $V" $PRE $NOTES_FLAG "$PACKAGE_NAME.tar.gz" "$PACKAGE_NAME.tar.gz.sha256"

  announce-tools:
    needs: [prepare-releases, release-tools]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Create tools announcement pull request
        env:
          GH_TOKEN: ${{ github.token }}
          TOOLS_JSON: ${{ needs.prepare-releases.outputs.tools }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          BRANCH="release/announce-tools"
          git checkout -B "$BRANCH" "origin/$DEFAULT_BRANCH"

          CHANGED=0
          while IFS=$'\t' read -r TOOL V; do
            P="tools/$TOOL"
            CURRENT=$(cat "$P/VERSION" 2>/dev/null | tr -d '[:space:]')
            if [ "$V" = "$CURRENT" ]; then
              echo "$TOOL VERSION already at $V"
              continue
            fi
            echo "$V" > "$P/VERSION"
            git add "$P/VERSION"
            CHANGED=$((CHANGED + 1))
            echo "Announcing $TOOL $V"
          done < <(echo "$TOOLS_JSON" | jq -r '.[] | [.packageName, .version] | @tsv')

          if [ "$CHANGED" -eq 0 ]; then
            echo "All tool VERSION files already up to date - nothing to announce"
            exit 0
          fi

          git commit -m "release: announce tools"
          git push --force origin "HEAD:$BRANCH"

          if gh pr list --head "$BRANCH" --base "$DEFAULT_BRANCH" --state open --json number --jq 'length' | grep -q '^0$'; then
            gh pr create \
              --base "$DEFAULT_BRANCH" \
              --head "$BRANCH" \
              --title "release: announce tools" \
              --body "Announces tool versions after all selected tool releases were published successfully."
          else
            echo "Announcement pull request already exists for $BRANCH"
          fi
