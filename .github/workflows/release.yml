name: Release

on:
  workflow_dispatch:
    inputs:
      release_server:
        description: 'Release server'
        required: false
        default: false
        type: boolean
      release_client:
        description: 'Release client'
        required: false
        default: false
        type: boolean
      release_lsp:
        description: 'Release LSP'
        required: false
        default: false
        type: boolean
      tool_apply_patch:
        description: 'Release apply-patch tool'
        required: false
        default: false
        type: boolean
      tool_edit:
        description: 'Release edit tool'
        required: false
        default: false
        type: boolean
      tool_glob:
        description: 'Release glob tool'
        required: false
        default: false
        type: boolean
      tool_grep:
        description: 'Release grep tool'
        required: false
        default: false
        type: boolean
      tool_ls:
        description: 'Release ls tool'
        required: false
        default: false
        type: boolean
      tool_lsp:
        description: 'Release lsp tool'
        required: false
        default: false
        type: boolean
      tool_multiedit:
        description: 'Release multiedit tool'
        required: false
        default: false
        type: boolean
      tool_read_file:
        description: 'Release read-file tool'
        required: false
        default: false
        type: boolean
      tool_shell:
        description: 'Release shell tool'
        required: false
        default: false
        type: boolean
      tool_todoread:
        description: 'Release todoread tool'
        required: false
        default: false
        type: boolean
      tool_todowrite:
        description: 'Release todowrite tool'
        required: false
        default: false
        type: boolean
      tool_webfetch:
        description: 'Release webfetch tool'
        required: false
        default: false
        type: boolean
      tool_write_file:
        description: 'Release write-file tool'
        required: false
        default: false
        type: boolean
      force:
        description: 'Force release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  prepare-releases:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.items }}
    steps:
      - id: matrix
        run: |
          ITEMS='[]'
          
          # Server
          if [ "${{ inputs.release_server }}" = "true" ]; then
            ITEMS=$(echo "$ITEMS" | jq -c '. += [{"type": "server"}]')
          fi
          
          # LSP
          if [ "${{ inputs.release_lsp }}" = "true" ]; then
            ITEMS=$(echo "$ITEMS" | jq -c '. += [{"type": "lsp"}]')
          fi
          
          # Tools - explicit checks for each
          if [ "${{ inputs.tool_apply_patch }}" = "true" ]; then
            ITEMS=$(echo "$ITEMS" | jq -c '. += [{"type": "tool", "name": "apply-patch"}]')
          fi
          if [ "${{ inputs.tool_edit }}" = "true" ]; then
            ITEMS=$(echo "$ITEMS" | jq -c '. += [{"type": "tool", "name": "edit"}]')
          fi
          if [ "${{ inputs.tool_glob }}" = "true" ]; then
            ITEMS=$(echo "$ITEMS" | jq -c '. += [{"type": "tool", "name": "glob"}]')
          fi
          if [ "${{ inputs.tool_grep }}" = "true" ]; then
            ITEMS=$(echo "$ITEMS" | jq -c '. += [{"type": "tool", "name": "grep"}]')
          fi
          if [ "${{ inputs.tool_ls }}" = "true" ]; then
            ITEMS=$(echo "$ITEMS" | jq -c '. += [{"type": "tool", "name": "ls"}]')
          fi
          if [ "${{ inputs.tool_lsp }}" = "true" ]; then
            ITEMS=$(echo "$ITEMS" | jq -c '. += [{"type": "tool", "name": "lsp"}]')
          fi
          if [ "${{ inputs.tool_multiedit }}" = "true" ]; then
            ITEMS=$(echo "$ITEMS" | jq -c '. += [{"type": "tool", "name": "multiedit"}]')
          fi
          if [ "${{ inputs.tool_read_file }}" = "true" ]; then
            ITEMS=$(echo "$ITEMS" | jq -c '. += [{"type": "tool", "name": "read-file"}]')
          fi
          if [ "${{ inputs.tool_shell }}" = "true" ]; then
            ITEMS=$(echo "$ITEMS" | jq -c '. += [{"type": "tool", "name": "shell"}]')
          fi
          if [ "${{ inputs.tool_todoread }}" = "true" ]; then
            ITEMS=$(echo "$ITEMS" | jq -c '. += [{"type": "tool", "name": "todoread"}]')
          fi
          if [ "${{ inputs.tool_todowrite }}" = "true" ]; then
            ITEMS=$(echo "$ITEMS" | jq -c '. += [{"type": "tool", "name": "todowrite"}]')
          fi
          if [ "${{ inputs.tool_webfetch }}" = "true" ]; then
            ITEMS=$(echo "$ITEMS" | jq -c '. += [{"type": "tool", "name": "webfetch"}]')
          fi
          if [ "${{ inputs.tool_write_file }}" = "true" ]; then
            ITEMS=$(echo "$ITEMS" | jq -c '. += [{"type": "tool", "name": "write-file"}]')
          fi
          
          echo "items=$ITEMS" >> $GITHUB_OUTPUT

  release:
    needs: prepare-releases
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        item: ${{ fromJson(needs.prepare-releases.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Release
        env:
          RELEASE_TYPE: ${{ matrix.item.type }}
          TOOL_NAME: ${{ matrix.item.name }}
          FORCE: ${{ inputs.force }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "$RELEASE_TYPE" = "server" ]; then
            V=$(cat packages/server/VERSION) && TAG="server/v${V}"
            if gh release view "$TAG" 2>/dev/null && [ "$FORCE" != "true" ]; then
              echo "Skipping $TAG - release already exists"
            else
              git tag -f "$TAG"
              git push origin "$TAG" --force
              mkdir -p packages/server/dist
              bun build --compile --target=bun-darwin-arm64 --outfile=packages/server/dist/jean2-darwin packages/server/src/index.ts
              bun build --compile --target=bun-linux-x64 --outfile=packages/server/dist/jean2-linux packages/server/src/index.ts
              [[ "$V" == *"-"* ]] && PRE="--prerelease" || PRE=""
              gh release create "$TAG" --title "Server $V" $PRE \
                packages/server/dist/jean2-darwin packages/server/dist/jean2-linux
            fi

          elif [ "$RELEASE_TYPE" = "lsp" ]; then
            V=$(cat services/lsp/VERSION) && TAG="lsp/v${V}"
            if gh release view "$TAG" 2>/dev/null && [ "$FORCE" != "true" ]; then
              echo "Skipping $TAG - release already exists"
            else
              git tag -f "$TAG"
              git push origin "$TAG" --force
              mkdir -p services/lsp/dist
              bun build --compile --target=bun-darwin-arm64 --outfile=services/lsp/dist/jean2-lsp-darwin services/lsp/src/index.ts
              bun build --compile --target=bun-linux-x64 --outfile=services/lsp/dist/jean2-lsp-linux services/lsp/src/index.ts
              [[ "$V" == *"-"* ]] && PRE="--prerelease" || PRE=""
              gh release create "$TAG" --title "LSP $V" $PRE \
                services/lsp/dist/jean2-lsp-darwin services/lsp/dist/jean2-lsp-linux
            fi

          elif [ "$RELEASE_TYPE" = "tool" ]; then
            P="tools/$TOOL_NAME"
            V=$(cat "$P/VERSION") && TAG="tool-$TOOL_NAME/v${V}"
            if gh release view "$TAG" 2>/dev/null && [ "$FORCE" != "true" ]; then
              echo "Skipping $TAG - release already exists"
            else
              git tag -f "$TAG"
              git push origin "$TAG" --force
              tar -czf "$TOOL_NAME.tar.gz" -C "$P" .
              [[ "$V" == *"-"* ]] && PRE="--prerelease" || PRE=""
              gh release create "$TAG" --title "Tool $TOOL_NAME $V" $PRE "$TOOL_NAME.tar.gz"
            fi
          fi

  release-client:
    needs: prepare-releases
    runs-on: macos-latest
    if: inputs.release_client
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install
        run: bun install

      - name: Client
        run: |
          V=$(cat packages/client/VERSION) && TAG="client/v${V}"
          if gh release view "$TAG" 2>/dev/null && [ "${{ inputs.force }}" != "true" ]; then
            echo "Skipping $TAG - release already exists"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -f "$TAG"
            git push origin "$TAG" --force
            cd packages/client && bun run tauri build --target aarch64-apple-darwin
            DMG=$(find packages/client/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
            [[ "$V" == *"-"* ]] && PRE="--prerelease" || PRE=""
            gh release create "$TAG" --title "Client $V" $PRE "$DMG"
          fi
