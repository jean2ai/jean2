          else
            tar -czf "$T.tar.gz" -C "$P" .
            gh release create "$TAG" --title "Tool $T $V" $([ "$V" == *"-"* ] && echo "--prerelease" || true) "$T.tar.gz"
          fi

      - name: Tool shell
        if: inputs.tool_shell
        run: |
          T="shell" && P="tools/$T"
          V=$(cat "$P/VERSION") && TAG="tool-$T/v${V}"
          if gh release view "$TAG" 2>/dev/null && [ "${{ inputs.force }}" != "true" ]; then
            echo "Skipping $TAG"
          else
            tar -czf "$T.tar.gz" -C "$P" .
            gh release create "$TAG" --title "Tool $T $V" $([ "$V" == *"-"* ] && echo "--prerelease" || true) "$T.tar.gz"
          fi

      - name: Tool todoread
        if: inputs.tool_todoread
        run: |
          T="todoread" && P="tools/$T"
          V=$(cat "$P/VERSION") && TAG="tool-$T/v${V}"
          if gh release view "$TAG" 2>/dev/null && [ "${{ inputs.force }}" != "true" ]; then
            echo "Skipping $TAG"
          else
            tar -czf "$T.tar.gz" -C "$P" .
            gh release create "$TAG" --title "Tool $T $V" $([ "$V" == *"-"* ] && echo "--prerelease" || true) "$T.tar.gz"
          fi

      - name: Tool todowrite
        if: inputs.tool_todowrite
        run: |
          T="todowrite" && P="tools/$T"
          V=$(cat "$P/VERSION") && TAG="tool-$T/v${V}"
          if gh release view "$TAG" 2>/dev/null && [ "${{ inputs.force }}" != "true" ]; then
            echo "Skipping $TAG"
          else
            tar -czf "$T.tar.gz" -C "$P" .
            gh release create "$TAG" --title "Tool $T $V" $([ "$V" == *"-"* ] && echo "--prerelease" || true) "$T.tar.gz"
          fi

      - name: Tool webfetch
        if: inputs.tool_webfetch
        run: |
          T="webfetch" && P="tools/$T"
          V=$(cat "$P/VERSION") && TAG="tool-$T/v${V}"
          if gh release view "$TAG" 2>/dev/null && [ "${{ inputs.force }}" != "true" ]; then
            echo "Skipping $TAG"
          else
            tar -czf "$T.tar.gz" -C "$P" .
            gh release create "$TAG" --title "Tool $T $V" $([ "$V" == *"-"* ] && echo "--prerelease" || true) "$T.tar.gz"
          fi

      - name: Tool write-file
        if: inputs.tool_write_file
        run: |
          T="write-file" && P="tools/$T"
          V=$(cat "$P/VERSION") && TAG="tool-$T/v${V}"
          if gh release view "$TAG" 2>/dev/null && [ "${{ inputs.force }}" != "true" ]; then
            echo "Skipping $TAG"
          else
            tar -czf "$T.tar.gz" -C "$P" .
            gh release create "$TAG" --title "Tool $T $V" $([ "$V" == *"-"* ] && echo "--prerelease" || true) "$T.tar.gz"
          fi
