name: Release Browser Extension

on:
  workflow_dispatch:
    inputs:
      release_browser:
        description: 'Release browser extension'
        required: false
        default: true
        type: boolean
      force:
        description: 'Force release (recreate existing)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-browser
  cancel-in-progress: false

jobs:
  prepare-browser-release:
    runs-on: ubuntu-latest
    if: inputs.release_browser
    outputs:
      tag: ${{ steps.info.outputs.tag }}
      version: ${{ steps.info.outputs.version }}
      prerelease: ${{ steps.info.outputs.prerelease }}
      should_skip: ${{ steps.info.outputs.should_skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: info
        run: |
          V=$(node -p "require('./packages/browser/package.json').version")
          echo "version=$V" >> $GITHUB_OUTPUT

          MANIFEST_V=$(node -p "require('./packages/browser/manifest.json').version")
          if [ "$V" != "$MANIFEST_V" ]; then
            echo "::error::packages/browser/manifest.json version ($MANIFEST_V) does not match packages/browser/package.json version ($V)"
            exit 1
          fi

          TAG="browser/v${V}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          if [[ "$V" == *"-"* ]]; then
            PRE=true
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            PRE=false
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

          RELEASE_STATE="none"
          if DRAFT=$(gh release view "$TAG" --json isDraft --jq '.isDraft' 2>/dev/null); then
            if [ "$DRAFT" = "true" ]; then
              RELEASE_STATE="draft"
            else
              RELEASE_STATE="published"
            fi
          fi

          if [ "${{ inputs.force }}" = "true" ]; then
            if [ "$RELEASE_STATE" != "none" ]; then
              echo "Deleting existing release $TAG for force recreation..."
              gh release delete "$TAG" --yes || true
            fi
          elif [ "$RELEASE_STATE" = "published" ]; then
            echo "should_skip=true" >> $GITHUB_OUTPUT
            echo "Release $TAG already exists, skipping build..."
            exit 0
          fi

          echo "should_skip=false" >> $GITHUB_OUTPUT

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "${{ inputs.force }}" = "true" ]; then
            git tag -f "$TAG"
            git push origin "$TAG" --force
          elif ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

          NOTES_FLAG=""
          if [ -s "changelogs/browser/v${V}.md" ]; then
            NOTES_FLAG="--notes-file changelogs/browser/v${V}.md"
          fi

          if [ "$RELEASE_STATE" = "draft" ] && [ "${{ inputs.force }}" != "true" ]; then
            echo "Resuming draft release $TAG"
          elif [ "$PRE" = "true" ]; then
            gh release create "$TAG" --draft --title "Browser Extension $V" --prerelease $NOTES_FLAG
          else
            gh release create "$TAG" --draft --title "Browser Extension $V" $NOTES_FLAG
          fi
          echo "Draft release $TAG is ready"

  build-and-upload:
    needs: prepare-browser-release
    runs-on: ubuntu-latest
    if: needs.prepare-browser-release.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Build extension
        run: bun run build:prod
        working-directory: packages/browser

      - name: Package extension
        working-directory: packages/browser
        run: |
          V="${{ needs.prepare-browser-release.outputs.version }}"
          cd dist
          zip -r "../jean2-browser-v${V}.zip" .
          cd ..
          SHA256=$(shasum -a 256 "jean2-browser-v${V}.zip" | cut -d' ' -f1)
          echo "$SHA256" > "jean2-browser-v${V}.zip.sha256"
          echo "SHA-256: $SHA256"

      - name: Upload artifacts
        env:
          TAG: ${{ needs.prepare-browser-release.outputs.tag }}
          V: ${{ needs.prepare-browser-release.outputs.version }}
        run: |
          cd packages/browser
          gh release upload "$TAG" \
            "jean2-browser-v${V}.zip" \
            "jean2-browser-v${V}.zip.sha256" \
            --clobber

  publish-release:
    needs: [prepare-browser-release, build-and-upload]
    runs-on: ubuntu-latest
    if: ${{ always() && !cancelled() && needs.prepare-browser-release.result == 'success' && (needs.prepare-browser-release.outputs.should_skip == 'true' || needs.build-and-upload.result == 'success') }}
    steps:
      - uses: actions/checkout@v4

      - name: Publish GitHub release
        env:
          TAG: ${{ needs.prepare-browser-release.outputs.tag }}
        run: |
          gh release edit "$TAG" --draft=false
          echo "Published release $TAG"

  announce:
    needs: [prepare-browser-release, publish-release]
    runs-on: ubuntu-latest
    if: always() && needs.publish-release.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Update VERSION file
        env:
          V: ${{ needs.prepare-browser-release.outputs.version }}
        run: |
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          git checkout -B "$DEFAULT_BRANCH" "origin/$DEFAULT_BRANCH"

          CURRENT=$(cat packages/browser/VERSION | tr -d '[:space:]')
          if [ "$CURRENT" = "$V" ]; then
            echo "VERSION already at $V, nothing to do"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$V" > packages/browser/VERSION
          git add packages/browser/VERSION
          git commit -m "chore(browser): announce $V"
          git push origin "$DEFAULT_BRANCH"
          echo "Announced browser extension $V"
