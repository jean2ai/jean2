name: Release Electron

on:
  workflow_dispatch:
    inputs:
      release_client:
        description: 'Release Electron desktop client (macOS + Windows together)'
        required: false
        default: true
        type: boolean
      force:
        description: 'Force release (recreate existing)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: release-client-${{ github.workflow }}-${{ github.ref }}
  # Never cancel an in-flight release; an interrupted publish could leave NPM
  # or the GitHub release in an inconsistent state.
  cancel-in-progress: false

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-client-release:
    runs-on: ubuntu-latest
    if: inputs.release_client
    outputs:
      tag: ${{ steps.info.outputs.tag }}
      version: ${{ steps.info.outputs.version }}
      prerelease: ${{ steps.info.outputs.prerelease }}
      should_skip: ${{ steps.info.outputs.should_skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: info
        env:
          FORCE: ${{ inputs.force }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # ---- Version source is package.json, NEVER VERSION ----
          # client package.json is the shared client version source.
          CLIENT_V=$(node -p "require('./packages/client/package.json').version")
          # client-electron must carry the exact same version (validation, not sync).
          ELECTRON_V=$(node -p "require('./packages/client-electron/package.json').version")
          if [ "$CLIENT_V" != "$ELECTRON_V" ]; then
            echo "::error::Version mismatch: packages/client/package.json=$CLIENT_V but packages/client-electron/package.json=$ELECTRON_V. They must be identical."
            exit 1
          fi
          V="$CLIENT_V"
          TAG="client/v${V}"

          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if [[ "$V" == *-* ]]; then
            PRE="true"
          else
            PRE="false"
          fi
          echo "prerelease=$PRE" >> "$GITHUB_OUTPUT"

          NOTES_FLAG=""
          if [ -s "changelogs/client/v${V}.md" ]; then
            NOTES_FLAG="--notes-file changelogs/client/v${V}.md"
          fi
          PRE_FLAG=""
          if [ "$PRE" = "true" ]; then
            PRE_FLAG="--prerelease"
          fi

          # ---- Determine existing release state ----
          RELEASE_STATE="none" # none | draft | published
          if DRAFT=$(gh release view "$TAG" --json isDraft --jq '.isDraft' 2>/dev/null); then
            if [ "$DRAFT" = "true" ]; then
              RELEASE_STATE="draft"
            else
              RELEASE_STATE="published"
            fi
          fi

          # ---- Force path: recreate everything as a draft ----
          if [ "$FORCE" = "true" ]; then
            if [ "$RELEASE_STATE" != "none" ]; then
              echo "Deleting existing release $TAG for force recreation..."
              gh release delete "$TAG" --yes || true
            fi
            # Force move the tag (explicit force semantics only).
            git tag -f "$TAG"
            git push origin "$TAG" --force
            gh release create "$TAG" --title "Client $V" --draft $PRE_FLAG $NOTES_FLAG
            echo "should_skip=false" >> "$GITHUB_OUTPUT"
            echo "Force-created draft release $TAG."
            exit 0
          fi

          # ---- Normal (non-force) path ----
          # A fully published release means this version already shipped: skip the
          # expensive desktop builds. Downstream NPM/publicity/announce jobs still
          # run and are idempotent, so a previously-failed VERSION announcement can
          # be retried without rebuilding release identity from VERSION.
          if [ "$RELEASE_STATE" = "published" ]; then
            echo "should_skip=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG is already published; skipping builds (downstream jobs remain idempotent)."
            exit 0
          fi

          echo "should_skip=false" >> "$GITHUB_OUTPUT"

          # Ensure the tag exists, but never force-move it for a normal release.
          if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

          if [ "$RELEASE_STATE" = "draft" ]; then
            # Reuse the existing draft (retry of a previous partial run).
            echo "Resuming existing draft release $TAG."
          else
            gh release create "$TAG" --title "Client $V" --draft $PRE_FLAG $NOTES_FLAG
            echo "Created draft release $TAG."
          fi

  release-client-macos:
    needs: prepare-client-release
    runs-on: macos-latest
    if: inputs.release_client && needs.prepare-client-release.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Verify client/client-electron versions match (build identity from package.json)
        run: |
          CLIENT_V=$(node -p "require('./packages/client/package.json').version")
          ELECTRON_V=$(node -p "require('./packages/client-electron/package.json').version")
          if [ "$CLIENT_V" != "$ELECTRON_V" ]; then
            echo "::error::Version mismatch: client=$CLIENT_V client-electron=$ELECTRON_V"
            exit 1
          fi
          echo "Build version: $CLIENT_V (electron-builder reads client-electron/package.json)"

      - name: Build macOS (release build with signing & notarization)
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bun run electron:build:mac:release

      - name: Upload macOS artifacts
        env:
          TAG: ${{ needs.prepare-client-release.outputs.tag }}
        run: |
          cd packages/client-electron/release
          # Upload for direct download (DMG + ZIP)
          for file in *.dmg *.zip; do
            if [ -f "$file" ]; then
              echo "Uploading $file"
              gh release upload "$TAG" "$file" --clobber
            fi
          done
          # Upload electron-updater artifacts
          if [ -f "latest-mac.yml" ]; then
            echo "Uploading latest-mac.yml"
            gh release upload "$TAG" "latest-mac.yml" --clobber
          fi
          for file in *.blockmap; do
            if [ -f "$file" ]; then
              echo "Uploading $file"
              gh release upload "$TAG" "$file" --clobber
            fi
          done

  release-client-windows:
    needs: prepare-client-release
    runs-on: windows-latest
    if: inputs.release_client && needs.prepare-client-release.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Verify client/client-electron versions match (build identity from package.json)
        shell: bash
        run: |
          CLIENT_V=$(node -p "require('./packages/client/package.json').version")
          ELECTRON_V=$(node -p "require('./packages/client-electron/package.json').version")
          if [ "$CLIENT_V" != "$ELECTRON_V" ]; then
            echo "::error::Version mismatch: client=$CLIENT_V client-electron=$ELECTRON_V"
            exit 1
          fi
          echo "Build version: $CLIENT_V (electron-builder reads client-electron/package.json)"

      - name: Build Windows (unsigned)
        run: bun run electron:build:win

      - name: Upload Windows artifacts
        shell: bash
        env:
          TAG: ${{ needs.prepare-client-release.outputs.tag }}
        run: |
          cd packages/client-electron/release
          shopt -s nullglob
          for file in *.exe *.msi; do
            if [ -f "$file" ]; then
              echo "Uploading $file"
              gh release upload "$TAG" "$file" --clobber
            fi
          done

  # Publish @jean2/client to NPM only after both desktop builds succeed.
  # This is the (formerly independent) reusable workflow, now invoked only here so
  # desktop and NPM can never release separately.
  publish-npm:
    needs: [prepare-client-release, release-client-macos, release-client-windows]
    # Runs when builds succeeded OR were skipped (already-published retry path).
    # Never runs if the prepare step or a desktop build failed, or the run was cancelled.
    if: ${{ always() && !cancelled() && needs.prepare-client-release.result == 'success' && (needs.prepare-client-release.outputs.should_skip == 'true' || (needs.release-client-macos.result == 'success' && needs.release-client-windows.result == 'success')) }}
    uses: ./.github/workflows/publish-client.yml
    with:
      version: ${{ needs.prepare-client-release.outputs.version }}
    secrets: inherit

  # Make the draft release public only after desktop artifacts + NPM are published,
  # so the updater never sees an incomplete release.
  publish-release:
    needs: [publish-npm, prepare-client-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish (undraft) the GitHub release
        env:
          TAG: ${{ needs.prepare-client-release.outputs.tag }}
          V: ${{ needs.prepare-client-release.outputs.version }}
        run: |
          set -euo pipefail
          NOTES_FLAG=""
          if [ -s "changelogs/client/v${V}.md" ]; then
            NOTES_FLAG="--notes-file changelogs/client/v${V}.md"
          fi
          # Idempotent: flip draft off. If the release was already published
          # (retry path), this is a harmless no-op that re-applies release notes.
          gh release edit "$TAG" --draft=false $NOTES_FLAG
          echo "Release $TAG is now public."

  # Final announcement: open a VERSION update pull request only after both
  # distribution channels are public. VERSION never sources a build/tag/package
  # version; it only records the latest successfully published version.
  announce-version:
    needs: [publish-release, prepare-client-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Create client announcement pull request
        env:
          GH_TOKEN: ${{ github.token }}
          V: ${{ needs.prepare-client-release.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          BRANCH="release/announce-client-${V}"
          git checkout -B "$BRANCH" "origin/$DEFAULT_BRANCH"
          CURRENT=$(tr -d '[:space:]' < packages/client/VERSION)
          if [ "$CURRENT" = "$V" ]; then
            echo "VERSION already $V; nothing to announce."
            exit 0
          fi

          printf '%s\n' "$V" > packages/client/VERSION
          git add packages/client/VERSION
          git commit -m "release(client): announce v$V"
          git push --force origin "HEAD:$BRANCH"

          if gh pr list --head "$BRANCH" --base "$DEFAULT_BRANCH" --state open --json number --jq 'length' | grep -q '^0$'; then
            gh pr create \
              --base "$DEFAULT_BRANCH" \
              --head "$BRANCH" \
              --title "release(client): announce v$V" \
              --body "Announces client $V after the desktop release and NPM package were published successfully."
          else
            echo "Announcement pull request already exists for $BRANCH"
          fi
