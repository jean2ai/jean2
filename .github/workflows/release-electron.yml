name: Release Electron

on:
  workflow_dispatch:
    inputs:
      release_electron_mac:
        description: 'Release Electron macOS build'
        required: false
        default: true
        type: boolean
      release_electron_win:
        description: 'Release Electron Windows build'
        required: false
        default: false
        type: boolean
      release_electron_linux:
        description: 'Release Electron Linux build'
        required: false
        default: false
        type: boolean
      force:
        description: 'Force release (recreate existing)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-electron-release:
    runs-on: ubuntu-latest
    if: inputs.release_electron_mac || inputs.release_electron_win || inputs.release_electron_linux
    outputs:
      tag: ${{ steps.info.outputs.tag }}
      version: ${{ steps.info.outputs.version }}
      prerelease: ${{ steps.info.outputs.prerelease }}
      should_skip: ${{ steps.info.outputs.should_skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: info
        run: |
          V=$(cat packages/client/VERSION)
          TAG="electron/v${V}"
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          if gh release view "$TAG" 2>/dev/null; then
            if [ "${{ inputs.force }}" != "true" ]; then
              echo "release_exists=true" >> $GITHUB_OUTPUT
              echo "should_skip=true" >> $GITHUB_OUTPUT
              echo "prerelease=false" >> $GITHUB_OUTPUT
              echo "Release $TAG already exists, skipping..."
              exit 0
            else
              echo "release_exists=true" >> $GITHUB_OUTPUT
              echo "Deleting existing release $TAG for force recreation..."
              gh release delete "$TAG" --yes || true
            fi
          else
            echo "release_exists=false" >> $GITHUB_OUTPUT
          fi

          echo "should_skip=false" >> $GITHUB_OUTPUT

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG"
          git push origin "$TAG" --force

          if [[ "$V" == *"-"* ]]; then
            PRE="true"
          else
            PRE="false"
          fi
          echo "prerelease=$PRE" >> $GITHUB_OUTPUT

          if [ "$PRE" == "true" ]; then
            gh release create "$TAG" --title "Electron $V" --prerelease
          else
            gh release create "$TAG" --title "Electron $V"
          fi
          echo "Release $TAG created successfully"

  release-electron-mac:
    needs: prepare-electron-release
    runs-on: macos-latest
    if: inputs.release_electron_mac && needs.prepare-electron-release.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Sync version from VERSION file
        run: |
          V=$(cat packages/client/VERSION)
          cd packages/client-electron
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$V';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Set client-electron version to $V"

      - name: Import Apple Certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          echo "$CSC_LINK" | base64 --decode > certificate.p12
          security create-keychain -p actions temp.keychain
          security import certificate.p12 -k temp.keychain -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s temp.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions temp.keychain
          rm -f certificate.p12

      - name: Build unsigned
        run: bun run electron:build:mac

      - name: Sign & Notarize
        env:
          CSC_NAME: ${{ secrets.CSC_NAME }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: cd packages/client-electron && ./scripts/sign-mac.sh

      - name: Upload macOS artifacts
        env:
          TAG: ${{ needs.prepare-electron-release.outputs.tag }}
        run: |
          cd packages/client-electron/release
          for file in *.dmg; do
            if [ -f "$file" ]; then
              echo "Uploading $file"
              gh release upload "$TAG" "$file" --clobber
            fi
          done

  release-electron-win:
    needs: prepare-electron-release
    runs-on: windows-latest
    if: inputs.release_electron_win && needs.prepare-electron-release.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Sync version from VERSION file
        shell: bash
        run: |
          V=$(cat packages/client/VERSION)
          cd packages/client-electron
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$V';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Set client-electron version to $V"

      - name: Build Windows
        run: bun run electron:build:win

      - name: Sign Windows
        shell: bash
        run: cd packages/client-electron && ./scripts/sign-win.sh

      - name: Upload Windows artifacts
        shell: bash
        env:
          TAG: ${{ needs.prepare-electron-release.outputs.tag }}
        run: |
          cd packages/client-electron/release
          shopt -s nullglob
          for file in *.exe *.msi; do
            if [ -f "$file" ]; then
              echo "Uploading $file"
              gh release upload "$TAG" "$file" --clobber
            fi
          done

  release-electron-linux:
    needs: prepare-electron-release
    runs-on: ubuntu-latest
    if: inputs.release_electron_linux && needs.prepare-electron-release.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Sync version from VERSION file
        run: |
          V=$(cat packages/client/VERSION)
          cd packages/client-electron
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$V';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Set client-electron version to $V"

      - name: Build Linux
        run: bun run electron:build:linux

      - name: Upload Linux artifacts
        env:
          TAG: ${{ needs.prepare-electron-release.outputs.tag }}
        run: |
          cd packages/client-electron/release
          shopt -s nullglob
          for file in *.AppImage *.deb; do
            if [ -f "$file" ]; then
              echo "Uploading $file"
              gh release upload "$TAG" "$file" --clobber
            fi
          done