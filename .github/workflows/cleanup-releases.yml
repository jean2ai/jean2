name: Cleanup Old Releases

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cleanup releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          delete_release() {
            local id="$1"
            local tag="$2"
            echo "  Deleting release $tag (id: $id)"
            gh api -X DELETE "repos/$GITHUB_REPOSITORY/releases/$id" --silent
            echo "  Deleting tag $tag"
            gh api -X DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/$tag" --silent || true
          }

          keep_and_count() {
            local keep="$1"
            shift
            local count=0
            for entry in "$@"; do
              IFS='|' read -r tag id <<< "$entry"
              count=$((count + 1))
              if [ $count -gt "$keep" ]; then
                delete_release "$id" "$tag"
              else
                echo "  Keeping $tag"
              fi
            done
          }

          echo "=== Server releases (keep last 5) ==="
          server_releases=$(gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --jq '.[] | select(.tag_name | startswith("server/")) | "\(.tag_name)|\(.id)"' \
            | sort -t'/' -k2 -r)
          keep_and_count 5 $server_releases

          echo ""
          echo "=== Client releases (keep last 5) ==="
          client_releases=$(gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --jq '.[] | select(.tag_name | startswith("client/")) | "\(.tag_name)|\(.id)"' \
            | sort -t'/' -k2 -r)
          keep_and_count 5 $client_releases

          echo ""
          echo "=== Tool releases (keep last 2 per tool) ==="
          tool_names=$(gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --jq '.[] | select(.tag_name | startswith("tool-")) | .tag_name' \
            | sed 's|/v.*||' | sort -u)

          for tool in $tool_names; do
            echo "--- $tool ---"
            tool_releases=$(gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
              --jq ".[] | select(.tag_name | startswith(\"$tool/\")) | \"\(.tag_name)|\(.id)\"" \
              | sort -t'/' -k2 -r)
            keep_and_count 2 $tool_releases
          done
