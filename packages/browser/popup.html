<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
      padding: 16px;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 6px;
      margin-bottom: 14px;
      font-weight: 500;
      font-size: 12px;
    }
    .status-bar.disconnected { background: #f3f4f6; color: #6b7280; }
    .status-bar.connecting   { background: #fef3c7; color: #92400e; }
    .status-bar.connected    { background: #d1fae5; color: #065f46; }
    .status-bar.error        { background: #fee2e2; color: #991b1b; }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .disconnected .status-dot { background: #9ca3af; }
    .connecting   .status-dot { background: #f59e0b; animation: pulse 1s infinite; }
    .connected    .status-dot { background: #10b981; }
    .error        .status-dot { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 12px;
    }
    input:focus { border-color: #6366f1; }
    input::placeholder { color: #9ca3af; }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    button {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    button:disabled { opacity: 0.5; cursor: default; }

    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #4f46e5; }

    .btn-danger { background: #fee2e2; color: #991b1b; }
    .btn-danger:hover:not(:disabled) { background: #fecaca; }

    .btn-secondary { background: #f3f4f6; color: #374151; }
    .btn-secondary:hover:not(:disabled) { background: #e5e7eb; }
  </style>
</head>
<body>
  <h1>
    <img src="icons/icon-32.png" width="20" height="20" alt="Jean2" />
    Jean2Browser
  </h1>

  <div id="status-bar" class="status-bar disconnected">
    <div class="status-dot"></div>
    <span id="status-text">Disconnected</span>
  </div>

  <label for="server-url">Server URL</label>
  <input id="server-url" type="url" placeholder="http://localhost:8742" />

  <label for="api-token">API Token <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
  <input id="api-token" type="password" placeholder="Leave empty if not required" />

  <div class="actions">
    <button id="btn-connect" class="btn-primary">Connect</button>
    <button id="btn-disconnect" class="btn-danger" disabled>Disconnect</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
